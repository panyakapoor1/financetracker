name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Permissions required for modern GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # 1. Security Audit
      - name: Security Audit (Backend)
        run: |
          cd backend
          npm audit --audit-level=high || true

      # 2. Backend Checks
      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Run Backend Tests (if any)
        run: |
          cd backend
          npm test || echo "No tests defined"

      # 3. Frontend Checks & Build
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Run Frontend Tests
        run: |
          cd frontend
          npm test -- --watchAll=false || echo "No tests defined"

      - name: Build Frontend
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          CI: false
        run: |
          cd frontend
          npm run build

      # 4. Setup & Upload Pages Artifact (The Modern Way)
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build

      # 5. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # 6. Trigger Backend Deployment
      - name: Trigger Render Deploy Hook
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          RENDER_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_HOOK" ]; then
            echo "⚠️ RENDER_DEPLOY_HOOK secret is missing. Skipping backend redeploy."
          else
            echo "🚀 Triggering backend redeploy..."
            curl -X POST "$RENDER_HOOK"
          fi
