name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # 1. Security Audit
      - name: Security Audit (Backend)
        run: |
          cd backend
          npm audit --audit-level=high || true # Warn but don't fail for audit

      # 2. Backend Checks
      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Run Backend Tests (if any)
        run: |
          cd backend
          npm test || echo "No tests defined"

      # 3. Frontend Checks & Build
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Run Frontend Tests
        run: |
          cd frontend
          npm test -- --watchAll=false || echo "No tests defined"

      - name: Build Frontend
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
        run: |
          cd frontend
          npm run build

      # 4. Deploy Frontend to GitHub Pages
      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend/build
          branch: gh-pages

      # 5. Trigger Backend Deployment
      - name: Trigger Render Deploy Hook
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.RENDER_DEPLOY_HOOK != ''
        run: |
          echo "🚀 Triggering backend redeploy..."
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
